<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Farmers Cancellation Form Filler</title>
<style>
  :root { --accent:#0a4d8c; --line:#d4d9e0; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0; background: #f3f5f8; color: #1c2530; line-height: 1.4;
  }
  header {
    background: var(--accent); color: #fff; padding: 18px 20px;
  }
  header h1 { margin: 0; font-size: 1.15rem; }
  header p { margin: 4px 0 0; font-size: .85rem; opacity: .9; }
  main { max-width: 640px; margin: 0 auto; padding: 20px; }
  .field { margin-bottom: 16px; }
  label { display: block; font-weight: 600; font-size: .85rem; margin-bottom: 5px; }
  input[type=text] {
    width: 100%; padding: 11px 12px; font-size: 1rem;
    border: 1px solid var(--line); border-radius: 8px; background: #fff;
  }
  input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(10,77,140,.15); }
  fieldset { border: 1px solid var(--line); border-radius: 10px; padding: 14px; margin: 0 0 16px; background:#fafbfc; }
  legend { font-weight: 700; font-size: .8rem; padding: 0 6px; color: var(--accent); text-transform: uppercase; letter-spacing: .03em; }
  .policy-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .policy-row span { width: 18px; color: #8a93a0; font-size: .8rem; }
  button {
    font: inherit; font-weight: 600; cursor: pointer; border: none; border-radius: 8px;
  }
  .primary {
    background: var(--accent); color: #fff; padding: 14px 18px; font-size: 1.05rem; width: 100%;
  }
  .primary:active { transform: translateY(1px); }
  .hint { font-size: .8rem; color: #66707c; margin-top: 6px; }
  .status { margin-top: 14px; font-size: .9rem; min-height: 1.2em; }
  .status.err { color: #b00020; }
  .status.ok { color: #1a7f37; }
  .note { background:#fff8e6; border:1px solid #f0dca0; border-radius:8px; padding:10px 12px; font-size:.82rem; margin-bottom:16px; }
</style>
</head>
<body>
<header>
  <h1>Farmers Cancellation Form Filler</h1>
  <p>Fill the values, download the completed PDF, then send for signature via DocuSign.</p>
</header>
<main>
  <div class="note">
    The <strong>Insured's Signature</strong> line is intentionally left blank — it gets signed in DocuSign.
  </div>

  <div class="field">
    <label for="date">Date (top of letter)</label>
    <input type="text" id="date" placeholder="06/19/2026" autocomplete="off" />
  </div>
  <div class="field">
    <label for="name">Name</label>
    <input type="text" id="name" placeholder="First Last" autocomplete="off" />
  </div>
  <div class="field">
    <label for="address">Address</label>
    <input type="text" id="address" placeholder="Street, City State ZIP" autocomplete="off" />
  </div>
  <div class="field">
    <label for="company">Insurance Company (being cancelled)</label>
    <input type="text" id="company" placeholder="e.g. Progressive" autocomplete="off" />
  </div>

  <fieldset>
    <legend>Policy Number(s)</legend>
    <div class="policy-row"><span>1</span><input type="text" id="policy1" autocomplete="off" /></div>
    <div class="policy-row"><span>2</span><input type="text" id="policy2" autocomplete="off" /></div>
    <div class="policy-row"><span>3</span><input type="text" id="policy3" autocomplete="off" /></div>
    <div class="policy-row"><span>4</span><input type="text" id="policy4" autocomplete="off" /></div>
  </fieldset>

  <div class="field">
    <label for="cancelDate">Date on Cancellation (effective date)</label>
    <input type="text" id="cancelDate" placeholder="07/15/2026" autocomplete="off" />
  </div>

  <button class="primary" id="generate">Generate &amp; Download Filled PDF</button>
  <div class="hint">Opens a print-ready PDF and downloads it as <code>Farmers-Cancellation.pdf</code>.</div>
  <div class="status" id="status"></div>
</main>

<!-- pdf-lib runs in your browser to stamp text onto the form -->
<script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="./template-pdf.js"></script>
<script>
(function () {
  "use strict";

  // Font size used for every stamped value.
  var FONT_SIZE = 11;

  // Field positions, calibrated against the scanned Farmers form.
  // Coordinates are the text BASELINE measured from the TOP-LEFT of the page,
  // in PDF points. They are converted to pdf-lib's bottom-left origin at draw time.
  var FIELDS = {
    date:       { x: 95,  yTop: 137 },
    name:       { x: 132, yTop: 277 },
    address:    { x: 156, yTop: 306 },
    company:    { x: 243, yTop: 334 },
    policy1:    { x: 220, yTop: 363 },
    policy2:    { x: 243, yTop: 377 },
    policy3:    { x: 224, yTop: 390 },
    policy4:    { x: 224, yTop: 403 },
    cancelDate: { x: 305, yTop: 447 }
  };

  var statusEl = document.getElementById("status");
  function setStatus(msg, cls) {
    statusEl.textContent = msg;
    statusEl.className = "status" + (cls ? " " + cls : "");
  }

  function val(id) {
    var el = document.getElementById(id);
    return el ? el.value.trim() : "";
  }

  function base64ToBytes(b64) {
    var bin = atob(b64);
    var bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }

  async function generate() {
    setStatus("Generating…");
    try {
      if (!window.PDFLib) {
        throw new Error("PDF library failed to load. Check your internet connection and reload.");
      }
      if (!window.FARMERS_CANCELLATION_PDF_B64) {
        throw new Error("Embedded form template is missing.");
      }

      var PDFDocument = window.PDFLib.PDFDocument;
      var StandardFonts = window.PDFLib.StandardFonts;
      var rgb = window.PDFLib.rgb;

      var bytes = base64ToBytes(window.FARMERS_CANCELLATION_PDF_B64);
      var pdfDoc = await PDFDocument.load(bytes);
      var page = pdfDoc.getPages()[0];
      var pageHeight = page.getHeight();
      var font = await pdfDoc.embedFont(StandardFonts.Helvetica);
      var black = rgb(0, 0, 0);

      var values = {
        date:       val("date"),
        name:       val("name"),
        address:    val("address"),
        company:    val("company"),
        policy1:    val("policy1"),
        policy2:    val("policy2"),
        policy3:    val("policy3"),
        policy4:    val("policy4"),
        cancelDate: val("cancelDate")
      };

      Object.keys(FIELDS).forEach(function (key) {
        var text = values[key];
        if (!text) return;
        var f = FIELDS[key];
        page.drawText(text, {
          x: f.x,
          y: pageHeight - f.yTop, // convert top-left baseline to bottom-left origin
          size: FONT_SIZE,
          font: font,
          color: black
        });
      });

      var out = await pdfDoc.save();
      var blob = new Blob([out], { type: "application/pdf" });
      var url = URL.createObjectURL(blob);

      var a = document.createElement("a");
      a.href = url;
      a.download = "Farmers-Cancellation.pdf";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function () { URL.revokeObjectURL(url); }, 4000);

      setStatus("Done — Farmers-Cancellation.pdf downloaded.", "ok");
    } catch (err) {
      console.error(err);
      setStatus(err.message || String(err), "err");
    }
  }

  document.getElementById("generate").addEventListener("click", generate);
})();
</script>
</body>
</html>
