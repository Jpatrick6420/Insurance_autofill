name: Deploy Cancellation Form to Pages

on:
  push:
    branches: ["claude/cancellation-form-extension-jyv2x7"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Enable Pages on the repo automatically if it isn't already.
          enablement: true

      - name: Upload the cancellation-form folder as the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./cancellation-form

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
